on:
  workflow_dispatch:
  push:
    branches: main

name: Quarto Publish

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2.2.0

      - name: Install Python and Dependencies
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Python Dependencies
        run: pip install -r requirements.txt

      - name: Install R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.5'

      - name: Restore R Dependencies
        uses: r-lib/actions/setup-renv@v2
        with:
          cache-version: 1

      - name: Render Book
        run: quarto render

      - name: Render Revealjs Deck
        run: |
          quarto render examples/query-garden-revealjs.qmd
          mkdir -p docs/examples
          cp examples/query-garden-revealjs.html docs/examples/query-garden-revealjs.html
          rm -rf docs/examples/query-garden-revealjs_files
          if [ -d examples/query-garden-revealjs_files ]; then
            cp -R examples/query-garden-revealjs_files docs/examples/query-garden-revealjs_files
          fi
          rm -f examples/query-garden-revealjs.html
          rm -rf examples/query-garden-revealjs_files

      - name: Render and Publish
        uses: quarto-dev/quarto-actions/publish@v2.2.0
        with:
          target: gh-pages
          render: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
